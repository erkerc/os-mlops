apiVersion: batch/v1
kind: Job
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    batch.kubernetes.io/job-tracking: ""
  labels:
    app.kubernetes.io/instance: database-app
    component: shared-database
  name: db-init-job
spec:
  backoffLimit: 4
  completionMode: NonIndexed
  completions: 1
  parallelism: 1
  selector:
    matchLabels:
      controller-uid: 1bb88d0a-1d7e-483f-950c-54b170c5195c
  suspend: false
  template:
    metadata:
      creationTimestamp: null
      labels:
        component: shared-database
        controller-uid: 1bb88d0a-1d7e-483f-950c-54b170c5195c
        job-name: db-init-job
    spec:
      containers:
      - args:
        - |
          echo "Running SQL script"
          psql -h $POSTGRESQL_DATABASE_HOST -p 5432 -U $POSTGRESQL_USER -d $POSTGRESQL_DATABASE -f /sql-script/script.sql
        command:
        - /bin/bash
        - -c
        env:
        - name: POSTGRESQL_DATABASE
          valueFrom:
            secretKeyRef:
              key: database-name
              name: demodb
        - name: POSTGRESQL_USER
          valueFrom:
            secretKeyRef:
              key: database-user
              name: demodb
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              key: database-password
              name: demodb
        - name: POSTGRESQL_DATABASE_HOST
          value: demodb.shared-database.svc.cluster.local
        image: registry.redhat.io/rhel9/postgresql-13:latest
        imagePullPolicy: Always
        name: postgresql
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /sql-script
          name: sql-script-volume
      dnsPolicy: ClusterFirst
      initContainers:
      - command:
        - sh
        - -c
        - until nc -z -v -w30 $POSTGRESQL_DATABASE 5432; do echo "Waiting for database
          connection..."; sleep 2; done;
        env:
        - name: POSTGRESQL_DATABASE
          value: demodb.shared-database.svc.cluster.local
        image: busybox:1.28
        imagePullPolicy: IfNotPresent
        name: wait-for-db
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
      restartPolicy: Never
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      volumes:
      - configMap:
          defaultMode: 420
          name: sql-script-configmap
        name: sql-script-volume
